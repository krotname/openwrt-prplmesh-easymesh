<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Стек доказательств работоспособности EasyMesh</title>
  <desc id="desc">Пирамида проверки от конфигурации и процессов через IEEE 1905 и BML до точности радиопараметров и реальной связности. Резервная копия и изолированное восстановление образуют страховочный контур.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7FAFF"/>
      <stop offset="1" stop-color="#EEF3F8"/>
    </linearGradient>
    <linearGradient id="headline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#102A43"/>
      <stop offset="1" stop-color="#243B53"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14532D"/>
      <stop offset="1" stop-color="#166534"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#102A43" flood-opacity="0.14"/>
    </filter>
    <marker id="upArrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M1 11 L6 1 L11 11 Z" fill="#0F766E"/>
    </marker>
    <style>
      .font { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .caps { font-family: Inter, "Segoe UI", Arial, sans-serif; font-weight: 750; letter-spacing: 2px; }
      .level-title { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 23px; font-weight: 760; fill: #FFFFFF; }
      .level-copy { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 16px; fill: #F8FAFC; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="148" fill="url(#headline)"/>
  <circle cx="1478" cy="45" r="165" fill="#38BDF8" opacity="0.10"/>
  <text x="76" y="58" class="caps" font-size="17" fill="#7DD3FC">ПРОВЕРКА ПО СЛОЯМ</text>
  <text x="76" y="109" class="font" font-size="42" font-weight="780" fill="#FFFFFF">Одинаковый SSID — только начало доказательства</text>
  <text x="1518" y="92" text-anchor="end" class="font" font-size="18" fill="#CBE9FF">Намерение → наблюдаемый результат</text>

  <!-- Main panels -->
  <rect x="48" y="182" width="1006" height="636" rx="32" fill="#FFFFFF" stroke="#D7E1EA" stroke-width="2"/>
  <rect x="1080" y="182" width="472" height="636" rx="32" fill="#FFFFFF" stroke="#D7E1EA" stroke-width="2"/>

  <text x="88" y="225" class="caps" font-size="15" fill="#52667A">СТЕК ЭКСПЛУАТАЦИОННЫХ ДОКАЗАТЕЛЬСТВ</text>

  <!-- Confidence arrow -->
  <line x1="116" y1="688" x2="116" y2="302" stroke="#0F766E" stroke-width="5" marker-end="url(#upArrow)"/>
  <text x="78" y="500" transform="rotate(-90 78 500)" text-anchor="middle" class="caps" font-size="14" fill="#0F766E">УВЕРЕННОСТЬ РАСТЁТ</text>

  <!-- Level 6 -->
  <g filter="url(#shadow)">
    <path d="M333 266 H797 Q817 266 817 286 V342 Q817 362 797 362 H333 Q313 362 313 342 V286 Q313 266 333 266 Z" fill="#0F766E"/>
  </g>
  <circle cx="362" cy="314" r="29" fill="#CCFBF1"/>
  <path d="M349 314 L358 323 L376 303" fill="none" stroke="#0F766E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="407" y="306" class="level-title">Реальная связность</text>
  <text x="407" y="334" class="level-copy">адрес · шлюз · маршрут · клиентский трафик</text>
  <rect x="735" y="292" width="56" height="43" rx="14" fill="#FFFFFF" opacity="0.18"/>
  <text x="763" y="321" text-anchor="middle" class="font" font-size="20" font-weight="800" fill="#FFFFFF">06</text>

  <!-- Level 5 -->
  <g filter="url(#shadow)">
    <rect x="268" y="378" width="594" height="86" rx="20" fill="#2563EB"/>
  </g>
  <circle cx="315" cy="421" r="25" fill="#DBEAFE"/>
  <path d="M303 425 Q315 407 327 425 M308 431 Q315 420 322 431" fill="none" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/>
  <text x="355" y="414" class="level-title">Радио точно по диапазону</text>
  <text x="355" y="442" class="level-copy">2,4 / 5 / 6 ГГц · канал · ширина · защита</text>
  <rect x="785" y="400" width="55" height="42" rx="14" fill="#FFFFFF" opacity="0.18"/>
  <text x="812" y="429" text-anchor="middle" class="font" font-size="20" font-weight="800" fill="#FFFFFF">05</text>

  <!-- Level 4 -->
  <g filter="url(#shadow)">
    <rect x="225" y="480" width="680" height="80" rx="19" fill="#7C3AED"/>
  </g>
  <circle cx="270" cy="520" r="24" fill="#EDE9FE"/>
  <circle cx="259" cy="514" r="5" fill="#6D28D9"/>
  <circle cx="281" cy="514" r="5" fill="#6D28D9"/>
  <circle cx="270" cy="529" r="5" fill="#6D28D9"/>
  <path d="M263 518 L267 525 M277 518 L273 525" stroke="#6D28D9" stroke-width="3"/>
  <text x="310" y="513" class="level-title">BML-топология</text>
  <text x="310" y="540" class="level-copy">агенты видны как Active · backhaul = Ethernet</text>
  <rect x="828" y="499" width="55" height="42" rx="14" fill="#FFFFFF" opacity="0.18"/>
  <text x="855" y="528" text-anchor="middle" class="font" font-size="20" font-weight="800" fill="#FFFFFF">04</text>

  <!-- Level 3 -->
  <g filter="url(#shadow)">
    <rect x="189" y="576" width="752" height="74" rx="18" fill="#0369A1"/>
  </g>
  <circle cx="232" cy="613" r="22" fill="#E0F2FE"/>
  <path d="M220 608 H244 M220 618 H244 M226 602 L220 608 L226 614 M238 612 L244 618 L238 624" fill="none" stroke="#0369A1" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="270" y="607" class="level-title">IEEE 1905.1</text>
  <text x="270" y="633" class="level-copy">обмен CMDU и соседство подтверждены трафиком</text>
  <rect x="866" y="593" width="54" height="40" rx="13" fill="#FFFFFF" opacity="0.18"/>
  <text x="893" y="621" text-anchor="middle" class="font" font-size="19" font-weight="800" fill="#FFFFFF">03</text>

  <!-- Level 2 -->
  <g filter="url(#shadow)">
    <rect x="158" y="664" width="814" height="68" rx="17" fill="#475569"/>
  </g>
  <circle cx="198" cy="698" r="20" fill="#E2E8F0"/>
  <path d="M188 698 H208 M198 688 V708" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <text x="232" y="694" class="level-title" font-size="21">Процессы и сервисы</text>
  <text x="232" y="718" class="level-copy">контроллер запущен · сокеты и журналы доступны</text>
  <rect x="901" y="678" width="51" height="39" rx="13" fill="#FFFFFF" opacity="0.18"/>
  <text x="926" y="705" text-anchor="middle" class="font" font-size="18" font-weight="800" fill="#FFFFFF">02</text>

  <!-- Level 1 -->
  <g filter="url(#shadow)">
    <rect x="136" y="744" width="858" height="58" rx="16" fill="#64748B"/>
  </g>
  <circle cx="174" cy="773" r="18" fill="#E2E8F0"/>
  <path d="M165 773 H183 M174 764 V782" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <text x="207" y="780" class="font" font-size="21" font-weight="760" fill="#FFFFFF">Конфигурация: SSID · роли · интерфейсы · параметры</text>
  <rect x="928" y="754" width="48" height="37" rx="12" fill="#FFFFFF" opacity="0.18"/>
  <text x="952" y="780" text-anchor="middle" class="font" font-size="18" font-weight="800" fill="#FFFFFF">01</text>

  <!-- Right explanation panel -->
  <text x="1120" y="225" class="caps" font-size="15" fill="#52667A">КАК ЧИТАТЬ РЕЗУЛЬТАТ</text>
  <rect x="1120" y="252" width="392" height="116" rx="20" fill="#FFF7ED" stroke="#FED7AA"/>
  <circle cx="1161" cy="294" r="23" fill="#FFEDD5"/>
  <text x="1161" y="302" text-anchor="middle" class="font" font-size="25" font-weight="850" fill="#C2410C">≠</text>
  <text x="1200" y="286" class="font" font-size="22" font-weight="760" fill="#9A3412">Совпавший SSID</text>
  <text x="1200" y="316" class="font" font-size="18" fill="#7C2D12">не доказывает EasyMesh</text>
  <text x="1141" y="348" class="font" font-size="16" fill="#9A3412">Нужны протокол, топология и трафик.</text>

  <rect x="1120" y="388" width="392" height="160" rx="20" fill="#EFF6FF" stroke="#BFDBFE"/>
  <circle cx="1161" cy="432" r="23" fill="#DBEAFE"/>
  <path d="M1151 432 L1158 439 L1172 423" fill="none" stroke="#1D4ED8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1200" y="426" class="font" font-size="22" font-weight="760" fill="#1E3A8A">Сильное доказательство</text>
  <text x="1141" y="466" class="font" font-size="17" fill="#334E68">Слои согласуются между собой:</text>
  <text x="1141" y="495" class="font" font-size="17" fill="#334E68">агент Active + Ethernet + нужное</text>
  <text x="1141" y="524" class="font" font-size="17" fill="#334E68">радио + реальная связность.</text>

  <rect x="1120" y="568" width="392" height="222" rx="20" fill="#F0FDF4" stroke="#BBE4C7"/>
  <circle cx="1161" cy="615" r="25" fill="#DCFCE7"/>
  <path d="M1149 611 V604 Q1149 596 1157 596 H1165 Q1173 596 1173 604 V611 M1146 611 H1176 V633 Q1176 640 1169 640 H1153 Q1146 640 1146 633 Z" fill="none" stroke="#15803D" stroke-width="4" stroke-linejoin="round"/>
  <text x="1200" y="610" class="font" font-size="22" font-weight="760" fill="#14532D">Страховочный контур</text>
  <text x="1141" y="655" class="font" font-size="18" font-weight="700" fill="#166534">Backup + изолированный restore</text>
  <text x="1141" y="690" class="font" font-size="17" fill="#3F6850">Проверяются до изменения сети.</text>
  <text x="1141" y="720" class="font" font-size="17" fill="#3F6850">Откат имеет одного владельца</text>
  <text x="1141" y="750" class="font" font-size="17" fill="#3F6850">и не зависит от живого канала.</text>

  <!-- Safety base -->
  <rect x="48" y="840" width="1504" height="40" rx="20" fill="url(#base)"/>
  <text x="800" y="867" text-anchor="middle" class="font" font-size="18" font-weight="730" fill="#FFFFFF">Без проверенного восстановления успешный тест сети всё ещё остаётся рискованным экспериментом</text>
</svg>
