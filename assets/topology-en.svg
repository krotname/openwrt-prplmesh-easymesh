<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cascaded wired EasyMesh topology</title>
  <desc id="desc">OpenWrt is the router, controller and access point. A Wi-Fi 6 node and a Wi-Fi 7 node are connected in sequence over Ethernet, while ordinary wired services remain in the same expandable LAN.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF6FF"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0F2747"/>
      <stop offset="1" stop-color="#173B63"/>
    </linearGradient>
    <linearGradient id="controller" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E7490"/>
      <stop offset="1" stop-color="#155E75"/>
    </linearGradient>
    <linearGradient id="wifi6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="wifi7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L13,7 L1,13 Z" fill="#1D4ED8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L13,7 L1,13 Z" fill="#15803D"/>
    </marker>
    <style>
      .font { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .smallcaps { font-family: Inter, "Segoe UI", Arial, sans-serif; font-weight: 700; letter-spacing: 2px; }
      .card-title { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 30px; font-weight: 750; fill: #FFFFFF; }
      .card-copy { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 20px; fill: #E6F7FF; }
      .chip { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 17px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="150" fill="url(#header)"/>
  <circle cx="1480" cy="-10" r="175" fill="#38BDF8" opacity="0.10"/>
  <circle cx="1535" cy="120" r="95" fill="#A78BFA" opacity="0.12"/>
  <text x="80" y="62" class="smallcaps" font-size="18" fill="#7DD3FC">NETWORK ARCHITECTURE</text>
  <text x="80" y="112" class="font" font-size="40" font-weight="760" fill="#FFFFFF">One controller, two wired EasyMesh nodes</text>
  <text x="1520" y="86" text-anchor="end" class="font" font-size="21" fill="#CBE9FF">Ethernet links · one shared LAN bridge</text>

  <!-- Backbone zone -->
  <rect x="54" y="192" width="1492" height="422" rx="34" fill="#FFFFFF" stroke="#D8E4F0" stroke-width="2"/>
  <text x="86" y="231" class="smallcaps" font-size="16" fill="#52667A">CASCADED ETHERNET</text>

  <!-- Ethernet links behind the cards -->
  <line x1="476" y1="400" x2="624" y2="400" stroke="#DCE7F3" stroke-width="18" stroke-linecap="round"/>
  <line x1="976" y1="400" x2="1124" y2="400" stroke="#DCE7F3" stroke-width="18" stroke-linecap="round"/>
  <line x1="476" y1="400" x2="616" y2="400" stroke="#1D4ED8" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <line x1="976" y1="400" x2="1116" y2="400" stroke="#1D4ED8" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <rect x="510" y="355" width="80" height="31" rx="15" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="550" y="377" text-anchor="middle" class="chip" fill="#1D4ED8">CABLE</text>
  <rect x="1010" y="355" width="80" height="31" rx="15" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="1050" y="377" text-anchor="middle" class="chip" fill="#1D4ED8">CABLE</text>
  <text x="550" y="433" text-anchor="middle" class="font" font-size="17" font-weight="650" fill="#475569">Ethernet</text>
  <text x="1050" y="433" text-anchor="middle" class="font" font-size="17" font-weight="650" fill="#475569">Ethernet</text>

  <!-- Controller card -->
  <g filter="url(#shadow)">
    <rect x="86" y="262" width="390" height="276" rx="28" fill="url(#controller)"/>
    <rect x="86" y="262" width="390" height="10" rx="5" fill="#67E8F9"/>
  </g>
  <g transform="translate(120 300)" stroke="#FFFFFF" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M12 39 V5 M96 39 V5"/>
    <rect x="0" y="38" width="108" height="58" rx="13"/>
    <circle cx="22" cy="67" r="4" fill="#FFFFFF" stroke="none"/>
    <circle cx="40" cy="67" r="4" fill="#FFFFFF" stroke="none"/>
    <path d="M66 67 H91"/>
  </g>
  <text x="253" y="329" class="card-title">OpenWrt</text>
  <text x="253" y="365" class="card-copy">router +</text>
  <text x="253" y="394" class="card-copy">controller + AP</text>
  <rect x="120" y="429" width="150" height="36" rx="18" fill="#ECFEFF" opacity="0.96"/>
  <text x="195" y="454" text-anchor="middle" class="chip" fill="#155E75">DHCP / firewall</text>
  <rect x="281" y="429" width="160" height="36" rx="18" fill="#ECFEFF" opacity="0.96"/>
  <text x="361" y="454" text-anchor="middle" class="chip" fill="#155E75">Wi-Fi 2.4 / 5 GHz</text>
  <text x="120" y="504" class="font" font-size="18" fill="#CFFAFE">Controls topology and policies</text>

  <!-- Wi-Fi 6 agent -->
  <g filter="url(#shadow)">
    <rect x="624" y="262" width="352" height="276" rx="28" fill="url(#wifi6)"/>
    <rect x="624" y="262" width="352" height="10" rx="5" fill="#93C5FD"/>
  </g>
  <g transform="translate(658 297)" stroke="#FFFFFF" stroke-width="5" fill="none" stroke-linecap="round">
    <rect x="0" y="50" width="103" height="67" rx="14"/>
    <path d="M14 50 V12 M89 50 V12"/>
    <circle cx="24" cy="84" r="4" fill="#FFFFFF" stroke="none"/>
    <path d="M68 84 H88"/>
    <path d="M26 31 Q51 5 76 31 M36 42 Q51 27 66 42" opacity="0.86"/>
  </g>
  <text x="790" y="329" class="card-title" font-size="27">EasyMesh</text>
  <text x="790" y="365" class="card-copy">Wi-Fi 6 node</text>
  <rect x="658" y="429" width="135" height="36" rx="18" fill="#EFF6FF" opacity="0.98"/>
  <text x="725" y="454" text-anchor="middle" class="chip" fill="#1D4ED8">AP mode</text>
  <rect x="804" y="429" width="138" height="36" rx="18" fill="#EFF6FF" opacity="0.98"/>
  <text x="873" y="454" text-anchor="middle" class="chip" fill="#1D4ED8">wired node</text>
  <text x="658" y="504" class="font" font-size="18" fill="#DBEAFE">Extends the LAN over Ethernet</text>

  <!-- Wi-Fi 7 agent -->
  <g filter="url(#shadow)">
    <rect x="1124" y="262" width="390" height="276" rx="28" fill="url(#wifi7)"/>
    <rect x="1124" y="262" width="390" height="10" rx="5" fill="#C4B5FD"/>
  </g>
  <g transform="translate(1158 297)" stroke="#FFFFFF" stroke-width="5" fill="none" stroke-linecap="round">
    <rect x="0" y="50" width="103" height="67" rx="14"/>
    <path d="M14 50 V12 M89 50 V12"/>
    <circle cx="24" cy="84" r="4" fill="#FFFFFF" stroke="none"/>
    <path d="M68 84 H88"/>
    <path d="M25 29 Q51 3 77 29 M35 42 Q51 26 67 42" opacity="0.86"/>
  </g>
  <text x="1290" y="329" class="card-title" font-size="27">EasyMesh</text>
  <text x="1290" y="365" class="card-copy">Wi-Fi 7 node</text>
  <rect x="1158" y="429" width="144" height="36" rx="18" fill="#F5F3FF" opacity="0.98"/>
  <text x="1230" y="454" text-anchor="middle" class="chip" font-size="15" fill="#6D28D9">6 GHz / 320 MHz</text>
  <rect x="1313" y="429" width="167" height="36" rx="18" fill="#F5F3FF" opacity="0.98"/>
  <text x="1397" y="454" text-anchor="middle" class="chip" fill="#6D28D9">WPA3 / SAE</text>
  <text x="1158" y="504" class="font" font-size="18" fill="#EDE9FE">Ethernet link, not a repeater</text>

  <!-- Shared bridge branch -->
  <rect x="54" y="646" width="1492" height="196" rx="32" fill="#F0FDF4" stroke="#BBE4C7" stroke-width="2"/>
  <rect x="84" y="678" width="416" height="132" rx="22" fill="#FFFFFF" stroke="#86C99A" stroke-width="2"/>
  <circle cx="133" cy="724" r="26" fill="#DCFCE7"/>
  <path d="M121 724 H145 M133 712 V736" stroke="#15803D" stroke-width="5" stroke-linecap="round"/>
  <text x="174" y="715" class="font" font-size="26" font-weight="760" fill="#14532D">Shared LAN bridge</text>
  <text x="174" y="748" class="font" font-size="18" fill="#3F6850">One L2 network for mesh and LAN</text>
  <rect x="174" y="766" width="211" height="28" rx="14" fill="#DCFCE7"/>
  <text x="280" y="786" text-anchor="middle" class="chip" font-size="15" fill="#166534">ready for more devices</text>

  <line x1="500" y1="744" x2="638" y2="744" stroke="#15803D" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <rect x="660" y="678" width="584" height="132" rx="22" fill="#FFFFFF" stroke="#86C99A" stroke-width="2"/>
  <g transform="translate(696 704)" stroke="#15803D" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="74" height="54" rx="9"/>
    <path d="M12 54 V70 H62 V54 M25 70 H49"/>
    <rect x="102" y="7" width="64" height="64" rx="9"/>
    <circle cx="134" cy="39" r="16"/>
    <circle cx="134" cy="39" r="5" fill="#15803D"/>
  </g>
  <text x="892" y="718" class="font" font-size="21" font-weight="760" fill="#14532D">Ordinary wired services</text>
  <text x="892" y="751" class="font" font-size="16" fill="#3F6850">server · cameras · LAN clients</text>
  <text x="892" y="784" class="font" font-size="15.5" font-weight="650" fill="#166534">Stay online during mesh tests</text>

  <rect x="1280" y="678" width="234" height="132" rx="22" fill="#163E2A"/>
  <text x="1397" y="713" text-anchor="middle" class="smallcaps" font-size="14" fill="#86EFAC">DESIGN GOAL</text>
  <text x="1397" y="745" text-anchor="middle" class="font" font-size="18" font-weight="720" fill="#FFFFFF">One expandable</text>
  <text x="1397" y="771" text-anchor="middle" class="font" font-size="18" font-weight="720" fill="#FFFFFF">LAN for every</text>
  <text x="1397" y="797" text-anchor="middle" class="font" font-size="18" font-weight="720" fill="#FFFFFF">wired consumer</text>

  <!-- Logical link from controller to shared bridge -->
  <path d="M281 538 V625 Q281 646 260 646" fill="none" stroke="#15803D" stroke-width="5" stroke-dasharray="9 9"/>
  <circle cx="281" cy="538" r="7" fill="#15803D"/>
</svg>
