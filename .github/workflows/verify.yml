name: Verify Revision 1 recipe

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recipe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Verify pinned inputs, patch set, and safe defaults
        run: bash tests/verify-recipe.sh

      - name: Check shell scripts
        run: shellcheck scripts/*.sh tests/*.sh

      - name: Reject whitespace errors
        run: git diff --check
